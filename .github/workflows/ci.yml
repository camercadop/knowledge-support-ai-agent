name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: cp .env.test .env
      - run: uv run ruff check .
      - run: uv run mypy app/
      - run: uv run lint-imports
      - run: uv audit --preview-features audit-command
      - run: uv run pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/knowledge_agent
