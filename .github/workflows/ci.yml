name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync
      - run: cp .env.test .env
      - run: uv run ruff check .
      - run: uv run mypy app/
      - run: uv run pytest
